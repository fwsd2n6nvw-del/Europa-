<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Moon Grid Sprite Starter</title>
<style>
  :root{
    --bg:#060914;
    --panel:#111827;
    --panel2:#171d2d;
    --line:#d8dde8;
    --cell-a:#9399a4;
    --cell-b:#767d88;
    --cell-c:#3d4350;
    --cell-d:#171b25;
    --button:#1a2132;
    --button-border:#354058;
    --button-icon:#b8c4e6;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  html,body{
    margin:0;
    min-height:100%;
    background:var(--bg);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }

  body{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:16px;
    color:#e8edf8;
  }

  .stage{
    width:min(96vw,760px);
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .map-wrap{
    width:100%;
    aspect-ratio:1/1;
    padding:8px;
    border:2px solid #2c3448;
    border-radius:22px;
    background:linear-gradient(180deg,#151b2a,#0d1220);
    box-shadow:0 0 0 1px rgba(255,255,255,.05) inset,0 14px 38px rgba(0,0,0,.45);
  }

  #grid{
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:repeat(30,1fr);
    grid-template-rows:repeat(30,1fr);
    border:2px solid rgba(255,255,255,.62);
    background:#202633;
    position:relative;
    overflow:hidden;
  }

  .cell{
    border:1px solid rgba(255,255,255,.78);
    background:var(--cell-a);
    position:relative;
  }

  .cell.t1{background:var(--cell-b)}
  .cell.t2{background:var(--cell-c)}
  .cell.t3{background:var(--cell-d)}
  .cell.glow::after{
    content:"";
    position:absolute;
    inset:20%;
    border-radius:3px;
    background:#aeb9df;
    box-shadow:0 0 6px #d7defb;
    opacity:.85;
  }

  #player{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:8%;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.7));
    pointer-events:none;
    position:relative;
    z-index:3;
  }

  .ui{
    width:100%;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:12px;
    padding:12px;
    border:2px solid #2c3448;
    border-radius:22px;
    background:linear-gradient(180deg,#161c2c,#0e1422);
    box-shadow:0 0 0 1px rgba(255,255,255,.05) inset;
  }

  button{
    height:66px;
    border-radius:16px;
    border:2px solid var(--button-border);
    background:linear-gradient(180deg,#242b3d,#161c2c);
    color:var(--button-icon);
    font-size:34px;
    font-weight:700;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 18px rgba(0,0,0,.28),0 0 18px rgba(185,197,230,.08) inset;
    touch-action:manipulation;
  }

  button:active{
    transform:translateY(1px) scale(.99);
    background:linear-gradient(180deg,#1c2334,#111827);
  }

  .dot,.pill,.gem,.ring,.burst{
    display:block;
    background:var(--button-icon);
    box-shadow:0 0 14px rgba(184,196,230,.35);
  }

  .dot{width:26px;height:26px;border-radius:50%}
  .pill{width:42px;height:18px;border-radius:99px}
  .gem{width:30px;height:30px;border-radius:7px;transform:rotate(45deg)}
  .ring{width:42px;height:42px;border:5px solid var(--button-icon);border-radius:50%;background:transparent}
  .burst{
    width:36px;
    height:36px;
    background:transparent;
    position:relative;
    box-shadow:none;
  }
  .burst::before,.burst::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:8px;
    height:36px;
    border-radius:99px;
    background:var(--button-icon);
    transform:translate(-50%,-50%);
    box-shadow:0 0 14px rgba(184,196,230,.35);
  }
  .burst::after{transform:translate(-50%,-50%) rotate(90deg)}

  .cell.action-flash::before{
    content:"";
    position:absolute;
    inset:18%;
    border:2px solid #d7defb;
    border-radius:50%;
    opacity:0;
    animation:actionPulse .36s ease-out;
    pointer-events:none;
    z-index:4;
  }

  @keyframes actionPulse{
    0%{transform:scale(.45);opacity:.95}
    100%{transform:scale(1.35);opacity:0}
  }

  @media (max-width:520px){
    body{padding:10px}
    .stage{width:100%;gap:14px}
    .map-wrap{padding:6px;border-radius:18px}
    .ui{gap:10px;padding:10px;border-radius:18px}
    button{height:58px;border-radius:14px;font-size:31px}
  }
</style>
</head>
<body>
  <main class="stage" aria-label="Moon grid game starter">
    <section class="map-wrap">
      <div id="grid" aria-label="30 by 30 moon grid"></div>
    </section>

    <nav class="ui" aria-label="Controls">
      <button id="leftBtn" aria-label="Move left"><span class="dot"></span></button>
      <button id="rightBtn" aria-label="Move right"><span class="pill"></span></button>
      <button id="upBtn" aria-label="Move up"><span class="gem"></span></button>
      <button id="downBtn" aria-label="Move down">＋</button>
      <button id="actionBtn" aria-label="Action"><span class="burst"></span></button>
    </nav>
  </main>

<script>
  const GRID_SIZE = 30;
  const grid = document.getElementById('grid');

  const craters = [
    [5,7],[6,7],[6,8],[7,8],[19,7],[20,7],[21,8],[22,9],
    [7,9],[8,9],[19,9],[20,10],[21,10],[22,10],
    [9,19],[10,20],[11,20],[8,21],[9,21],[10,21],[11,22],
    [23,22],[24,22],[25,23],[24,24]
  ];

  const glowTiles = [[28,13]];

  let playerPos = {x:15,y:15};
  let playerEl;

  function terrainType(x,y){
    const seed = (x * 17 + y * 31 + x * y * 7) % 11;
    if (seed < 2) return 't2';
    if (seed < 6) return 't1';
    return 't0';
  }

  function isCrater(x,y){
    return craters.some(([cx,cy]) => cx === x && cy === y);
  }

  function isGlow(x,y){
    return glowTiles.some(([gx,gy]) => gx === x && gy === y);
  }

  function buildGrid(){
    grid.innerHTML = '';
    for(let y=1;y<=GRID_SIZE;y++){
      for(let x=1;x<=GRID_SIZE;x++){
        const cell = document.createElement('div');
        cell.className = `cell ${terrainType(x,y)}`;
        if(isCrater(x,y)) cell.className = 'cell t3';
        if(isGlow(x,y)) cell.classList.add('glow');
        cell.dataset.x = x;
        cell.dataset.y = y;
        grid.appendChild(cell);
      }
    }

    playerEl = document.createElement('img');
    playerEl.id = 'player';
    playerEl.src = 'assets/player.svg';
    playerEl.alt = '';
    placePlayer();
  }

  function cellAt(x,y){
    return grid.querySelector(`[data-x="${x}"][data-y="${y}"]`);
  }

  function placePlayer(){
    const current = document.getElementById('player');
    if(current) current.remove();
    cellAt(playerPos.x, playerPos.y).appendChild(playerEl);
  }

  function move(dx,dy){
    const nextX = Math.max(1, Math.min(GRID_SIZE, playerPos.x + dx));
    const nextY = Math.max(1, Math.min(GRID_SIZE, playerPos.y + dy));
    playerPos = {x:nextX,y:nextY};
    if(dx < 0) playerEl.style.transform = 'scaleX(-1)';
    if(dx > 0) playerEl.style.transform = 'scaleX(1)';
    placePlayer();
  }

  document.getElementById('leftBtn').addEventListener('click',()=>move(-1,0));
  document.getElementById('rightBtn').addEventListener('click',()=>move(1,0));
  document.getElementById('upBtn').addEventListener('click',()=>move(0,-1));
  document.getElementById('downBtn').addEventListener('click',()=>move(0,1));
  function action(){
    const cell = cellAt(playerPos.x, playerPos.y);
    cell.classList.remove('action-flash');
    void cell.offsetWidth;
    cell.classList.add('action-flash');
  }

  document.getElementById('actionBtn').addEventListener('click',action);

  window.addEventListener('keydown',(e)=>{
    if(e.key === 'ArrowLeft') move(-1,0);
    if(e.key === 'ArrowRight') move(1,0);
    if(e.key === 'ArrowUp') move(0,-1);
    if(e.key === 'ArrowDown') move(0,1);
  });

  buildGrid();
</script>
</body>
</html>
