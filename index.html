<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Moon Grid Alien</title>
<style>
  :root{
    --bg:#030915;
    --cell-a:#e8f1ff;
    --cell-b:#bccfe8;
    --cell-c:#6281aa;
    --cell-d:#142844;
    --button-border:#41577c;
    --button-icon:#e7f1ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 10%,#13274a 0%, #07122a 36%, #030915 72%, #02050d 100%);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#eef5ff;overflow-x:hidden}
  body{display:flex;justify-content:center;align-items:center;padding:16px}
  .stage{width:min(96vw,760px);display:flex;flex-direction:column;gap:16px}
  .map-wrap{width:100%;aspect-ratio:1/1;padding:8px;border:2px solid #385074;border-radius:22px;background:linear-gradient(180deg,#193159,#0d1830);box-shadow:0 0 0 1px rgba(255,255,255,.08) inset,0 16px 40px rgba(0,0,0,.48),0 0 20px rgba(164,208,255,.08)}
  #board{position:relative;width:100%;height:100%;overflow:hidden;border:2px solid rgba(255,255,255,.78);background:linear-gradient(180deg,#233757,#1b2944);contain:layout paint size}
  #grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(30,1fr);grid-template-rows:repeat(30,1fr)}
  .cell{min-width:0;min-height:0;border:1px solid rgba(255,255,255,.88);background:var(--cell-a);position:relative}
  .cell.t1{background:var(--cell-b)} .cell.t2{background:var(--cell-c)} .cell.t3{background:var(--cell-d)}
  .cell.glow::after{content:"";position:absolute;inset:20%;border-radius:3px;background:#dff4ff;box-shadow:0 0 8px #f5fbff;opacity:.95}
  .cell.action-flash::before{content:"";position:absolute;inset:18%;border:2px solid #f0f8ff;border-radius:50%;opacity:0;animation:actionPulse .36s ease-out;pointer-events:none;z-index:4;box-shadow:0 0 10px rgba(230,245,255,.8)}
  @keyframes actionPulse{0%{transform:scale(.45);opacity:.95}100%{transform:scale(1.35);opacity:0}}
  #playerLayer{position:absolute;inset:0;pointer-events:none;z-index:10;overflow:visible}
  #player{position:absolute;width:0;height:0;left:0;top:0;overflow:visible;will-change:transform}
  #alienSprite{position:absolute;left:0;top:0;width:100%;height:100%;transform:translate(-50%,-70%);filter:drop-shadow(0 3px 3px rgba(0,0,0,.85));}
  .ui{width:100%;display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:12px;border:2px solid #385074;border-radius:22px;background:linear-gradient(180deg,#172b4b,#0d1730);box-shadow:0 0 0 1px rgba(255,255,255,.08) inset,0 0 18px rgba(164,208,255,.06)}
  button{height:66px;border-radius:16px;border:2px solid var(--button-border);background:linear-gradient(180deg,#223b63,#15284a);color:var(--button-icon);font-size:36px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(0,0,0,.28),0 0 18px rgba(220,238,255,.08) inset;touch-action:manipulation}
  button:active{transform:translateY(1px) scale(.99);background:linear-gradient(180deg,#1a3051,#101d35)}
  .actionIcon{font-size:38px;text-shadow:0 0 14px rgba(184,196,230,.35)}
  @media (max-width:520px){body{padding:10px}.stage{width:100%;gap:14px}.map-wrap{padding:6px;border-radius:18px}.ui{gap:10px;padding:10px;border-radius:18px}button{height:58px;border-radius:14px;font-size:32px}.actionIcon{font-size:35px}}
</style>
</head>
<body>
  <main class="stage" aria-label="Moon grid game starter">
    <section class="map-wrap">
      <div id="board" aria-label="30 by 30 moon grid">
        <div id="grid"></div>
        <div id="playerLayer"><div id="player"><svg id="alienSprite" viewBox="0 0 80 108" aria-hidden="true">
          <defs>
            <radialGradient id="head" cx="42%" cy="27%" r="62%"><stop offset="0" stop-color="#d9e2ee"/><stop offset="0.55" stop-color="#8794a4"/><stop offset="1" stop-color="#3a4350"/></radialGradient>
            <linearGradient id="body" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#aab5c3"/><stop offset="0.55" stop-color="#596574"/><stop offset="1" stop-color="#28303a"/></linearGradient>
            <radialGradient id="eye" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffb2a5"/><stop offset="0.22" stop-color="#ff2418"/><stop offset="0.72" stop-color="#6d0707"/><stop offset="1" stop-color="#110306"/></radialGradient>
            <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2.1" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <ellipse cx="40" cy="101" rx="17" ry="4" fill="#000" opacity="0.35"/>
          <path d="M26 53 C24 62 24 75 26 92 C28 101 52 101 54 92 C56 76 56 62 54 53 C49 59 31 59 26 53Z" fill="url(#body)" stroke="#151b24" stroke-width="2"/>
          <path d="M25 62 C18 70 16 82 18 96" fill="none" stroke="#4c5867" stroke-width="7" stroke-linecap="round"/><path d="M55 62 C62 70 64 82 62 96" fill="none" stroke="#4c5867" stroke-width="7" stroke-linecap="round"/>
          <path d="M30 94 L27 104" stroke="#2d3744" stroke-width="6" stroke-linecap="round"/><path d="M50 94 L53 104" stroke="#2d3744" stroke-width="6" stroke-linecap="round"/>
          <path d="M31 63 C34 68 46 68 49 63 M30 74 C34 79 46 79 50 74 M31 84 C35 88 45 88 49 84" fill="none" stroke="#c3ccd8" stroke-width="1.2" opacity=".55"/>
          <path d="M40 4 C19 4 8 18 8 34 C8 52 22 62 40 64 C58 62 72 52 72 34 C72 18 61 4 40 4Z" fill="url(#head)" stroke="#111722" stroke-width="2.4"/>
          <ellipse cx="26" cy="37" rx="13" ry="8" transform="rotate(18 26 37)" fill="#10141b" opacity=".95"/><ellipse cx="54" cy="37" rx="13" ry="8" transform="rotate(-18 54 37)" fill="#10141b" opacity=".95"/>
          <ellipse cx="27" cy="38" rx="6.5" ry="5" transform="rotate(18 27 38)" fill="url(#eye)" filter="url(#glow)"/><ellipse cx="53" cy="38" rx="6.5" ry="5" transform="rotate(-18 53 38)" fill="url(#eye)" filter="url(#glow)"/>
          <circle cx="29.5" cy="34.8" r="1.6" fill="#ffd8d2" opacity=".9"/><circle cx="55.5" cy="34.8" r="1.6" fill="#ffd8d2" opacity=".9"/>
          <path d="M36 48 Q40 51 44 48" fill="none" stroke="#1d222b" stroke-width="1.4" stroke-linecap="round"/><ellipse cx="37.5" cy="45" rx="1.1" ry="2.5" fill="#1b2129"/><ellipse cx="42.5" cy="45" rx="1.1" ry="2.5" fill="#1b2129"/>
          <circle cx="31" cy="19" r="2" fill="#687482" opacity=".7"/><circle cx="25" cy="24" r="1.7" fill="#687482" opacity=".55"/><circle cx="49" cy="19" r="2" fill="#687482" opacity=".7"/><circle cx="55" cy="24" r="1.7" fill="#687482" opacity=".55"/>
          <path d="M16 96 C15 103 19 107 22 101" fill="none" stroke="#2d3744" stroke-width="3" stroke-linecap="round"/><path d="M64 96 C65 103 61 107 58 101" fill="none" stroke="#2d3744" stroke-width="3" stroke-linecap="round"/>
        </svg></div></div>
      </div>
    </section>
    <nav class="ui" aria-label="Controls">
      <button id="leftBtn" aria-label="Move left">←</button>
      <button id="rightBtn" aria-label="Move right">→</button>
      <button id="upBtn" aria-label="Move up">↑</button>
      <button id="downBtn" aria-label="Move down">↓</button>
      <button id="actionBtn" aria-label="Action"><span class="actionIcon">✦</span></button>
    </nav>
  </main>
<script>
  const GRID_SIZE = 30;
  const grid = document.getElementById('grid');
  const board = document.getElementById('board');
  const player = document.getElementById('player');
  const sprite = document.getElementById('alienSprite');
  const craters = [[5,7],[6,7],[6,8],[7,8],[19,7],[20,7],[21,8],[22,9],[7,9],[8,9],[19,9],[20,10],[21,10],[22,10],[9,19],[10,20],[11,20],[8,21],[9,21],[10,21],[11,22],[23,22],[24,22],[25,23],[24,24]];
  const glowTiles = [[28,13]];
  let playerPos = {x:15,y:15};
  let facing = 1;

  function terrainType(x,y){const seed=(x*17+y*31+x*y*7)%11;if(seed<2)return't2';if(seed<6)return't1';return't0'}
  function isCrater(x,y){return craters.some(([cx,cy])=>cx===x&&cy===y)}
  function isGlow(x,y){return glowTiles.some(([gx,gy])=>gx===x&&gy===y)}
  function buildGrid(){
    grid.innerHTML='';
    for(let y=1;y<=GRID_SIZE;y++)for(let x=1;x<=GRID_SIZE;x++){
      const cell=document.createElement('div');
      cell.className=`cell ${terrainType(x,y)}`;
      if(isCrater(x,y))cell.className='cell t3';
      if(isGlow(x,y))cell.classList.add('glow');
      cell.dataset.x=x;cell.dataset.y=y;grid.appendChild(cell);
    }
    placePlayer();
  }
  function cellAt(x,y){return grid.querySelector(`[data-x="${x}"][data-y="${y}"]`)}
  function placePlayer(){
    const tile=board.clientWidth/GRID_SIZE;
    const centerX=(playerPos.x-.5)*tile;
    const centerY=(playerPos.y-.5)*tile;
    player.style.width=`${tile*1.35}px`;
    player.style.height=`${tile*1.72}px`;
    player.style.transform=`translate3d(${centerX}px,${centerY}px,0)`;
    sprite.style.transform=`translate(-50%,-70%) scaleX(${facing})`;
  }
  function move(dx,dy){
    playerPos.x=Math.max(1,Math.min(GRID_SIZE,playerPos.x+dx));
    playerPos.y=Math.max(1,Math.min(GRID_SIZE,playerPos.y+dy));
    if(dx<0)facing=-1;if(dx>0)facing=1;
    placePlayer();
  }
  function action(){const cell=cellAt(playerPos.x,playerPos.y);if(!cell)return;cell.classList.remove('action-flash');void cell.offsetWidth;cell.classList.add('action-flash')}
  document.getElementById('leftBtn').addEventListener('click',()=>move(-1,0));
  document.getElementById('rightBtn').addEventListener('click',()=>move(1,0));
  document.getElementById('upBtn').addEventListener('click',()=>move(0,-1));
  document.getElementById('downBtn').addEventListener('click',()=>move(0,1));
  document.getElementById('actionBtn').addEventListener('click',action);
  window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move(-1,0);if(e.key==='ArrowRight')move(1,0);if(e.key==='ArrowUp')move(0,-1);if(e.key==='ArrowDown')move(0,1);if(e.key===' '||e.key==='Enter')action()});
  window.addEventListener('resize',placePlayer,{passive:true});
  buildGrid();
</script>
</body>
</html>
